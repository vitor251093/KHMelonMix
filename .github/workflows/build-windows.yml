name: Windows

on:
  push:
    branches:
      - master
      - ci/*
      - feature/*
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  MELONDS_GIT_BRANCH: ${{ github.ref }}
  MELONDS_GIT_HASH: ${{ github.sha }}
  MELONDS_BUILD_PROVIDER: GitHub Actions
#  MELONDS_VERSION_SUFFIX: " RC"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: x86_64
            image: windows-2025-vs2026
          - name: arm64
            image: windows-11-arm

    name: ${{ matrix.arch.name }}
    runs-on: ${{ matrix.arch.image }}
    env:
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg_cache,readwrite
    steps:
    - name: Check out sources
      uses: actions/checkout@v6
    - name: Restore vcpkg cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ github.workspace }}/vcpkg_cache
        key: vcpkg-x86_64-mingw-${{ hashFiles('vcpkg.json') }}
        restore-keys: vcpkg-x86_64-mingw-
    - name: Set up vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: vcpkg.json
    - name: Set Version Suffix
      shell: bash
      run: |
        if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
          TIMESTAMP=$(date +'%Y%m%d%H%M')
          BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "MELONDS_VERSION_SUFFIX=-$BRANCH_NAME-$TIMESTAMP" >> $GITHUB_ENV
        fi
    - name: Build
      uses: lukka/run-cmake@v10
      with:
        configurePreset: release-windows-${{ matrix.arch.name }}
        configurePresetAdditionalArgs: "['-DENABLE_DEBUG_DEPS=OFF', '-DMELONDS_EMBED_BUILD_INFO=ON']"
        buildPreset: release-windows-${{ matrix.arch.name }}
    - name: Preparing artifacts
      shell: bash
      working-directory: ${{runner.workspace}}\KHMelonMix\build\release-windows-${{ matrix.arch.name }}
      run: |
        rm -rf dist || true
        mkdir dist
        mkdir -p ./dist/roms
        touch ./dist/roms/DELETE_ME
        cp -r ../assets ./dist/assets
        mv ./melonDS.exe ./dist/MelonMix.exe
        cp ../../res/*.exe          ./dist/
        cp ../../res/khDaysMM.ico   ./dist/MelonMix_KHDays.ico
        cp ../../res/khCodedMM.ico  ./dist/MelonMix_KHReCoded.ico
        cp ../../res/scripts/MelonMix_KHDays.bat       ./dist/MelonMix_KHDays.bat
        cp ../../res/scripts/MelonMix_KHReCoded.bat    ./dist/MelonMix_KHReCoded.bat
        cp ../../res/scripts/MelonMix_GameSelector.bat ./dist/MelonMix_GameSelector.bat
    - uses: actions/upload-artifact@v7
      with:
        name: MelonMix-windows-${{ matrix.arch.name }}
        path: ${{runner.workspace}}\KHMelonMix\build\release-windows-${{ matrix.arch.name }}\dist
    - name: Save vcpkg cache
      uses: actions/cache/save@v4
      with:
        path: ${{ github.workspace }}/vcpkg_cache
        key: vcpkg-${{ matrix.arch.name }}-windows-${{ hashFiles('vcpkg.json') }}
